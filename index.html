<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Status por Escola</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
      font-family: Arial, Helvetica, sans-serif;
      color: #243043;
    }

    .hero {
      background: linear-gradient(135deg, #0d6efd 0%, #0b5ed7 100%);
      color: #fff;
      border-radius: 22px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(13, 110, 253, 0.18);
    }

    .card-soft {
      border: 0;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }

    .summary-number {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
    }

    .mini-label {
      font-size: 0.85rem;
      color: #64748b;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .03em;
    }

    .filter-box {
      border-radius: 14px;
      border: 1px solid #dbe3ef;
      padding: 12px 14px;
      box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.03);
    }

    .table thead th {
      background: #0d6efd;
      color: #fff;
      position: sticky;
      top: 0;
      z-index: 1;
      text-align: center;
      vertical-align: middle;
    }

    .school-name {
      font-weight: 700;
      color: #1e293b;
    }

    .badge-status {
      font-size: 0.85rem;
      padding: 0.5rem 0.8rem;
      border-radius: 999px;
      font-weight: 700;
      display: inline-block;
      min-width: 110px;
      text-align: center;
    }

    .status-ok {
      background: #dcfce7;
      color: #166534;
    }

    .status-pendente {
      background: #fee2e2;
      color: #991b1b;
    }

    .status-vazio {
      background: #e5e7eb;
      color: #4b5563;
    }

    .loading-box {
      padding: 40px;
      text-align: center;
      color: #64748b;
      font-size: 1rem;
    }

    .tab-card h6 {
      margin-bottom: .3rem;
    }
  </style>
</head>
<body>
  <div class="container py-5">

    <div class="hero mb-4">
      <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3">
        <div>
          <h1 class="fw-bold mb-2">Painel de Status por Escola</h1>
          <p class="mb-0 fs-5">
            Visualização consolidada dos contratos A, B e C
          </p>
        </div>
      </div>
    </div>

    <div class="row g-4 mb-4">
      <div class="col-md-4">
        <div class="card card-soft h-100">
          <div class="card-body">
            <div class="mini-label mb-2">Escolas encontradas</div>
            <div class="summary-number" id="totalEscolas">0</div>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card card-soft h-100">
          <div class="card-body">
            <div class="mini-label mb-2">Registros OK</div>
            <div class="summary-number text-success" id="totalOk">0</div>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card card-soft h-100">
          <div class="card-body">
            <div class="mini-label mb-2">Registros Pendentes</div>
            <div class="summary-number text-danger" id="totalPendentes">0</div>
          </div>
        </div>
      </div>
    </div>

    <div class="card card-soft mb-4">
      <div class="card-body">
        <div class="row g-3 align-items-end">
          <div class="col-md-6">
            <label class="form-label fw-semibold">Buscar escola</label>
            <input type="text" id="searchInput" class="form-control filter-box" placeholder="Digite o nome da escola...">
          </div>
          <div class="col-md-3">
            <label class="form-label fw-semibold">Filtrar situação</label>
            <select id="statusFilter" class="form-select filter-box">
              <option value="">Todas</option>
              <option value="ok">Com OK</option>
              <option value="pendente">Com Pendente</option>
              <option value="somente_pendente">Somente Pendentes</option>
              <option value="tudo_ok">Tudo OK</option>
            </select>
          </div>
          <div class="col-md-3">
            <button class="btn btn-primary w-100 py-2 fw-semibold" id="reloadBtn">
              Atualizar dados
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="row g-4 mb-4" id="sheetSummaries"></div>

    <div class="card card-soft">
      <div class="card-header bg-white border-0 pt-4 px-4">
        <h4 class="fw-bold mb-1">Visão consolidada por escola</h4>
        <p class="text-secondary mb-0">Cada coluna representa um contrato.</p>
      </div>
      <div class="card-body">
        <div id="loading" class="loading-box">Carregando dados...</div>

        <div class="table-responsive d-none" id="tableWrapper">
          <table class="table table-hover align-middle" id="statusTable">
            <thead>
              <tr id="tableHeadRow">
                <th>Nome da Escola</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzkEilvwExFa5RFOQK6apiprxdMDc1H0I4Rg-XmolpgW286pL1BguQtSriDP8owlRn97A/exec";

    const searchInput = document.getElementById("searchInput");
    const statusFilter = document.getElementById("statusFilter");
    const reloadBtn = document.getElementById("reloadBtn");
    const loading = document.getElementById("loading");
    const tableWrapper = document.getElementById("tableWrapper");
    const tableHeadRow = document.getElementById("tableHeadRow");
    const tableBody = document.getElementById("tableBody");
    const sheetSummaries = document.getElementById("sheetSummaries");

    let consolidatedData = [];
    let sheetStats = [];
    let sheetNames = [];

    function normalizeText(value) {
      return (value || "").toString().trim().replace(/\s+/g, " ");
    }

    function normalizeSchoolName(value) {
      return normalizeText(value).toLowerCase();
    }

    function statusBadge(status) {
      if (status === "Ok") {
        return `<span class="badge-status status-ok">Ok</span>`;
      }
      if (status === "Pendente") {
        return `<span class="badge-status status-pendente">Pendente</span>`;
      }
      return `<span class="badge-status status-vazio">—</span>`;
    }

    async function loadData() {
      loading.classList.remove("d-none");
      tableWrapper.classList.add("d-none");
      loading.textContent = "Carregando dados...";

      try {
        const response = await fetch(API_URL);
        const json = await response.json();

        if (!json.success) {
          throw new Error(json.error || "Erro ao carregar os dados.");
        }

        sheetNames = json.sheets || [];
        sheetStats = json.summaries || [];
        consolidatedData = json.data || [];

        document.getElementById("totalEscolas").textContent = json.totals?.escolas ?? 0;
        document.getElementById("totalOk").textContent = json.totals?.ok ?? 0;
        document.getElementById("totalPendentes").textContent = json.totals?.pendente ?? 0;

        renderSheetSummaries();
        renderTable();

        loading.classList.add("d-none");
        tableWrapper.classList.remove("d-none");
      } catch (error) {
        console.error(error);
        loading.textContent = "Não foi possível carregar os dados da planilha/API.";
      }
    }

    function renderSheetSummaries() {
      sheetSummaries.innerHTML = "";

      sheetStats.forEach(sheet => {
        const col = document.createElement("div");
        col.className = "col-md-4";

        col.innerHTML = `
          <div class="card card-soft h-100 tab-card">
            <div class="card-body">
              <h6 class="fw-bold">${sheet.name}</h6>
              <div class="text-secondary mb-3">Resumo individual</div>
              <div class="d-flex justify-content-between mb-2">
                <span>Ok</span>
                <strong class="text-success">${sheet.ok || 0}</strong>
              </div>
              <div class="d-flex justify-content-between mb-2">
                <span>Pendente</span>
                <strong class="text-danger">${sheet.pendente || 0}</strong>
              </div>
              <div class="d-flex justify-content-between">
                <span>Total</span>
                <strong>${sheet.total || 0}</strong>
              </div>
            </div>
          </div>
        `;

        sheetSummaries.appendChild(col);
      });
    }

    function renderTable() {
      tableHeadRow.innerHTML = "<th>Nome da Escola</th>";
      sheetNames.forEach(sheet => {
        tableHeadRow.innerHTML += `<th>${sheet}</th>`;
      });

      const searchValue = normalizeSchoolName(searchInput.value);
      const filterValue = statusFilter.value;

      const filtered = consolidatedData.filter(item => {
        const nomeMatch = normalizeSchoolName(item.escola).includes(searchValue);
        if (!nomeMatch) return false;

        const statuses = sheetNames.map(sheet => item[sheet] || "");
        const hasOk = statuses.includes("Ok");
        const hasPendente = statuses.includes("Pendente");
        const onlyPendentes = statuses.every(s => s === "Pendente" || s === "");
        const allOk = statuses.every(s => s === "Ok" || s === "");

        if (filterValue === "ok") return hasOk;
        if (filterValue === "pendente") return hasPendente;
        if (filterValue === "somente_pendente") return hasPendente && onlyPendentes;
        if (filterValue === "tudo_ok") return hasOk && allOk;

        return true;
      });

      tableBody.innerHTML = "";

      if (!filtered.length) {
        tableBody.innerHTML = `
          <tr>
            <td colspan="${sheetNames.length + 1}" class="text-center py-4 text-secondary">
              Nenhuma escola encontrada com esse filtro.
            </td>
          </tr>
        `;
        return;
      }

      filtered.forEach(item => {
        const tr = document.createElement("tr");
        let rowHtml = `<td class="school-name">${item.escola}</td>`;

        sheetNames.forEach(sheet => {
          rowHtml += `<td class="text-center">${statusBadge(item[sheet] || "")}</td>`;
        });

        tr.innerHTML = rowHtml;
        tableBody.appendChild(tr);
      });
    }

    searchInput.addEventListener("input", renderTable);
    statusFilter.addEventListener("change", renderTable);
    reloadBtn.addEventListener("click", loadData);

    loadData();
  </script>
</body>
</html>
